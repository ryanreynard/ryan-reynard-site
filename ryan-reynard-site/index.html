<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ryan Reynard | Home</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --navy: #0d1b2a;
      --slate: #1b2a3b;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --light: #f4f1ec;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--navy);
      color: var(--light);
    }

    /* ── Navbar ── */
    .navbar {
      background-color: rgba(13, 27, 42, 0.97);
      border-bottom: 2px solid var(--gold);
    }
    .navbar-brand {
      font-family: 'Playfair Display', serif;
      color: var(--gold) !important;
      font-size: 1.4rem;
      letter-spacing: 1px;
    }
    .nav-link {
      color: var(--light) !important;
      font-weight: 600;
      letter-spacing: .5px;
      transition: color .2s;
    }
    .nav-link:hover { color: var(--gold) !important; }

    /* ── Hero ── */
    .hero {
      min-height: 100vh;
      background:
        linear-gradient(to bottom, rgba(13,27,42,.75) 0%, rgba(13,27,42,.95) 100%),
        url('https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?w=1600&q=80') center/cover no-repeat;
      display: flex;
      align-items: center;
    }
    .hero-eyebrow {
      font-size: .85rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 600;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 7vw, 5.5rem);
      line-height: 1.05;
      color: #fff;
    }
    .hero h1 span { color: var(--gold); }
    .hero-sub {
      font-size: 1.15rem;
      font-weight: 300;
      color: #c8d6e5;
      max-width: 520px;
    }
    .btn-gold {
      background: var(--gold);
      color: var(--navy);
      font-weight: 700;
      border: none;
      padding: .75rem 2rem;
      border-radius: 2px;
      letter-spacing: .5px;
      transition: background .2s, transform .15s;
    }
    .btn-gold:hover {
      background: var(--gold-light);
      color: var(--navy);
      transform: translateY(-2px);
    }
    .btn-outline-gold {
      border: 2px solid var(--gold);
      color: var(--gold);
      font-weight: 700;
      padding: .75rem 2rem;
      border-radius: 2px;
      background: transparent;
      letter-spacing: .5px;
      transition: all .2s;
    }
    .btn-outline-gold:hover {
      background: var(--gold);
      color: var(--navy);
    }

    /* ── Section base ── */
    section { padding: 90px 0; }
    .section-label {
      font-size: .78rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 600;
      margin-bottom: .4rem;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      color: #fff;
    }
    .gold-bar {
      width: 52px; height: 3px;
      background: var(--gold);
      margin: 12px 0 28px;
    }

    /* ── About ── */
    #about { background-color: var(--slate); }
    .about-stat {
      border-left: 3px solid var(--gold);
      padding-left: 16px;
    }
    .about-stat .num {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      color: var(--gold);
    }
    .about-stat .lbl {
      font-size: .82rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #8fa8c0;
    }

    /* ── Cards ── */
    #highlights { background-color: var(--navy); }
    .hi-card {
      background: var(--slate);
      border: 1px solid rgba(201,168,76,.2);
      border-radius: 4px;
      transition: transform .25s, border-color .25s, box-shadow .25s;
      height: 100%;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
    }
    .hi-card:hover {
      transform: translateY(-6px);
      border-color: var(--gold);
      box-shadow: 0 12px 32px rgba(0,0,0,.45);
      color: inherit;
      text-decoration: none;
    }
    .hi-card-icon {
      font-size: 2.4rem;
      color: var(--gold);
    }
    .hi-card h5 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: #fff;
    }
    .hi-card p {
      font-size: .93rem;
      color: #8fa8c0;
      flex-grow: 1;
    }
    .hi-card .arrow {
      font-size: .85rem;
      color: var(--gold);
      font-weight: 600;
      letter-spacing: .5px;
    }

    /* ── Passions banner ── */
    #passions {
      background:
        linear-gradient(to right, rgba(13,27,42,.92), rgba(27,42,59,.88)),
        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1600&q=80') center/cover no-re
